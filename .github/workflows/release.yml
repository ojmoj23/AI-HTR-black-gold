name: Auto Release Backup

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 10 * * 1'  # каждый понедельник в 10:00 UTC

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get date and short SHA
        id: meta
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "tag=weekly-$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
            echo "name=Weekly snapshot $(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          else
            echo "tag=release-$(date +'%Y-%m-%d')-${{ env.sha }}" >> $GITHUB_OUTPUT
            echo "name=Release $(date +'%Y-%m-%d') (${GITHUB_SHA::7})" >> $GITHUB_OUTPUT
          fi
        env:
          sha: ${{ steps.meta.outputs.sha }}

      - name: Create zip archive
        run: |
          zip -r source.zip . \
            --exclude "node_modules/*" \
            --exclude "dist/*" \
            --exclude ".git/*" \
            --exclude ".astro/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            Автоматический бэкап исходного кода сайта AI HTR.

            - **Дата:** ${{ steps.meta.outputs.date }}
            - **Коммит:** ${{ github.sha }}
            - **Триггер:** ${{ github.event_name == 'schedule' && 'Еженедельный снимок' || 'Пуш в main' }}
          files: source.zip
          draft: false
          prerelease: false
